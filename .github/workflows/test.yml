name: Issue Status Change in Project
on:
  projects_v2_item:
    types: [edited]

jobs:
  update-project-status:
    runs-on: ubuntu-latest
    steps:
      - name: Check Project and Status
        uses: actions/github-script@v7
        with:
          script: |
            const item = context.payload.projects_v2_item;
            const project_id = item.project_node_id;  // Get Project ID
            
            const SPECIFIC_PROJECT_ID = "PVT_kwDOBT5nd84Aq3l8"; 
            
            if (project_id !== SPECIFIC_PROJECT_ID) {
              console.log("Not the project we're tracking. Skipping...");
              return;
            }

            console.log(`Issue updated in Project ${project_id}`);

            if (item.content_type === "Issue" && item.field_value === "Done") {
              console.log("Performing actions for 'Done' status...");
            }
