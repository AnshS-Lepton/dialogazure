name: Update Specific Project Status on Issue Change
on:
  project_card:
    types: [moved]

jobs:
  update-specific-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check Project and Column
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');

            // Get project card details
            const card = context.payload.project_card;
            const project_id = card.project_url.split('/').pop(); // Extract project ID from URL
            
            const SPECIFIC_PROJECT_ID = "123456"; // Replace with your project ID

            if (project_id === SPECIFIC_PROJECT_ID) {
              console.log(`Issue moved in Project ${SPECIFIC_PROJECT_ID} to ${card.column_name}`);
              
              if (card.column_name === "Done") {
                console.log("Triggering post-processing actions for 'Done' status.");
                // Add actions (notify team, close issues, update labels, etc.)
              }
            } else {
              console.log("Issue moved in a different project, ignoring.");
            }
